name: SaaS CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 🔍 Checkout Code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: 📦 Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: 🏗️ Build Frontend
      run: |
        cd frontend
        npm run build

    - name: ✅ Validation Complete
      run: echo "Code is healthy and ready for deployment!"

  # Render handles the actual deployment automatically when push to main is successful.
